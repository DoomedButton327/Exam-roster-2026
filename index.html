<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hans Moore Gr 12 — June 2026 Exam Timetable</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg-base: #050a1a;
    --bg-card: #0a1628;
    --bg-card2: #0d1f3c;
    --border: #1a3a6e;
    --border-glow: #2563eb;
    --accent: #3b82f6;
    --accent2: #8b5cf6;
    --accent3: #06b6d4;
    --neon-blue: #00d4ff;
    --neon-purple: #a855f7;
    --neon-green: #10b981;
    --neon-amber: #f59e0b;
    --neon-red: #ef4444;
    --neon-pink: #ec4899;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #475569;
    --session1: #1e3a5f;
    --session2: #2d1b4e;
    --cat-language: #1e3a5f;
    --cat-maths: #1a2f1a;
    --cat-science: #1a2a2f;
    --cat-technical: #2a1f0a;
    --cat-commerce: #1f1a2a;
    --cat-tourism: #2a1a0a;
    --cat-arts: #2a0a1a;
    --cat-general: #1a1a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-base);
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STARFIELD */
  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(1); }
    to { opacity: 0.8; transform: scale(1.3); }
  }

  /* GRID OVERLAY */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(59,130,246,0.08) 0%, transparent 100%);
  }

  .school-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(59,130,246,0.1);
    border: 1px solid var(--border-glow);
    border-radius: 999px;
    padding: 0.3rem 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent3);
    letter-spacing: 0.15em;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .school-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--neon-green);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--neon-green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.5rem, 4vw, 2.8rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--neon-blue) 0%, var(--accent2) 50%, var(--neon-pink) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(0,212,255,0.3));
  }

  header p {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 1rem;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
    background: rgba(5,10,26,0.8);
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
  }

  .stat-number {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--neon-blue);
    text-shadow: 0 0 10px rgba(0,212,255,0.5);
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .stat-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
    align-self: center;
  }

  /* TOOLBAR */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.7rem;
    padding: 0.8rem 2rem;
    background: rgba(5,10,26,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .toolbar-group {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .toolbar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 0.2rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 1rem;
    border-radius: 6px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, #1d4ed8, #6d28d9);
    color: white;
    border-color: #3b82f6;
    box-shadow: 0 0 12px rgba(59,130,246,0.3);
  }
  .btn-primary:hover { box-shadow: 0 0 20px rgba(59,130,246,0.5); transform: translateY(-1px); }

  .btn-success {
    background: linear-gradient(135deg, #065f46, #047857);
    color: #6ee7b7;
    border-color: #10b981;
  }
  .btn-success:hover { box-shadow: 0 0 16px rgba(16,185,129,0.4); transform: translateY(-1px); }

  .btn-danger {
    background: rgba(239,68,68,0.1);
    color: #f87171;
    border-color: #ef4444;
  }
  .btn-danger:hover { background: rgba(239,68,68,0.2); transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    color: var(--text-secondary);
    border-color: var(--border);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .btn-export {
    background: linear-gradient(135deg, #7c3aed, #db2777);
    color: white;
    border-color: #a855f7;
    box-shadow: 0 0 12px rgba(168,85,247,0.3);
  }
  .btn-export:hover { box-shadow: 0 0 20px rgba(168,85,247,0.5); transform: translateY(-1px); }

  .view-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .view-btn {
    padding: 0.45rem 0.8rem;
    background: transparent;
    color: var(--text-muted);
    border: none;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
    font-family: 'Space Grotesk', sans-serif;
  }

  .view-btn.active {
    background: rgba(59,130,246,0.2);
    color: var(--accent);
  }

  .filter-select {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 0.45rem 0.8rem;
    border-radius: 6px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
  }

  .filter-select:focus { outline: none; border-color: var(--accent); }

  /* MAIN CONTENT */
  main {
    position: relative;
    z-index: 5;
    padding: 1.5rem 2rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* CALENDAR VIEW */
  .month-block {
    margin-bottom: 2.5rem;
  }

  .month-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .month-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--neon-blue);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .month-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-glow), transparent);
  }

  .month-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  /* EXAM CARDS - LIST VIEW */
  .exam-list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .day-group {
    position: relative;
  }

  .day-label {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 0.6rem;
    padding-left: 0.5rem;
  }

  .day-date {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-primary);
  }

  .day-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .day-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .exam-card {
    position: relative;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.8rem 1rem;
    align-items: start;
    transition: all 0.25s;
    overflow: hidden;
    cursor: default;
  }

  .exam-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--card-accent, var(--accent));
    border-radius: 10px 0 0 10px;
  }

  .exam-card:hover {
    border-color: var(--card-accent, var(--border-glow));
    box-shadow: 0 0 20px rgba(59,130,246,0.15);
    transform: translateX(3px);
  }

  /* Category colors */
  .cat-language { --card-accent: var(--accent); background: rgba(30,58,95,0.3); }
  .cat-maths { --card-accent: var(--neon-green); background: rgba(16,185,129,0.05); }
  .cat-science { --card-accent: var(--accent3); background: rgba(6,182,212,0.05); }
  .cat-technical { --card-accent: var(--neon-amber); background: rgba(245,158,11,0.05); }
  .cat-commerce { --card-accent: var(--neon-purple); background: rgba(168,85,247,0.05); }
  .cat-tourism { --card-accent: #f97316; background: rgba(249,115,22,0.05); }
  .cat-arts { --card-accent: var(--neon-pink); background: rgba(236,72,153,0.05); }
  .cat-general { --card-accent: var(--text-muted); background: rgba(71,85,105,0.1); }

  .card-session-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    min-width: 52px;
  }

  .session-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .session-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--card-accent, var(--accent));
    line-height: 1;
    text-shadow: 0 0 10px currentColor;
  }

  .session-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .card-body {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .card-subject {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-session1 { background: rgba(59,130,246,0.15); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }
  .badge-session2 { background: rgba(168,85,247,0.15); color: var(--neon-purple); border: 1px solid rgba(168,85,247,0.3); }
  .badge-duration { background: rgba(16,185,129,0.1); color: var(--neon-green); border: 1px solid rgba(16,185,129,0.2); }
  .badge-special { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); animation: flashBorder 2s ease-in-out infinite; }
  .badge-code { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }

  @keyframes flashBorder {
    0%,100% { border-color: rgba(239,68,68,0.3); }
    50% { border-color: rgba(239,68,68,0.8); box-shadow: 0 0 8px rgba(239,68,68,0.3); }
  }

  .card-notes {
    font-size: 0.78rem;
    color: var(--text-secondary);
    line-height: 1.5;
    font-family: 'Space Grotesk', sans-serif;
  }

  .card-actions {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    align-items: flex-end;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 30px; height: 30px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    transition: all 0.2s;
  }

  .icon-btn:hover.delete { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.1); }
  .icon-btn:hover.edit { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.1); }

  /* TIMELINE VIEW */
  .timeline-view {
    display: none;
  }

  .timeline-day {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 0;
    margin-bottom: 0.5rem;
  }

  .timeline-date-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 0.5rem;
  }

  .tl-date-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-secondary);
    line-height: 1;
  }

  .tl-date-day {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .tl-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border-glow);
    margin: 0.5rem auto 0;
    box-shadow: 0 0 8px var(--border-glow);
  }

  .tl-line {
    width: 2px;
    flex: 1;
    background: var(--border);
    margin: 0 auto;
    min-height: 20px;
  }

  .timeline-sessions {
    padding: 0.3rem 0 0.8rem 1.5rem;
    border-left: 2px solid var(--border);
    margin-left: 39px;
  }

  /* GRID VIEW */
  .grid-view {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  .grid-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .grid-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    border-radius: 0 12px 0 60px;
    background: rgba(255,255,255,0.02);
  }

  .grid-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); border-color: var(--card-accent, var(--border-glow)); }

  .grid-card-date {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .grid-card-subject {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg-card2);
    border: 1px solid var(--border-glow);
    border-radius: 16px;
    width: 100%;
    max-width: 540px;
    padding: 2rem;
    box-shadow: 0 0 60px rgba(59,130,246,0.2);
    position: relative;
    animation: modalIn 0.25s ease-out;
    max-height: 90vh;
    overflow-y: auto;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(-10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .modal-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--neon-blue);
    letter-spacing: 0.05em;
  }

  .modal-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { border-color: #ef4444; color: #ef4444; }

  .form-group {
    margin-bottom: 1rem;
  }

  .form-label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }

  .form-textarea { resize: vertical; min-height: 80px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
  }

  .modal-footer {
    display: flex;
    gap: 0.8rem;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    padding: 1rem 1.2rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .legend-title {
    width: 100%;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
  }

  /* SESSION INFO BOX */
  .session-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .session-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    position: relative;
    overflow: hidden;
  }

  .session-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 10px 0 0 10px;
  }

  .session-box.s1::before { background: var(--accent); }
  .session-box.s2::before { background: var(--neon-purple); }

  .session-box-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .s1 .session-box-title { color: var(--accent); }
  .s2 .session-box-title { color: var(--neon-purple); }

  .session-row {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-secondary);
    padding: 0.2rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .session-row:last-child { border-bottom: none; }

  .session-row-label { color: var(--text-muted); }

  /* LOADING & EXPORT */
  .export-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
  }

  .export-overlay.show { display: flex; }

  .export-spinner {
    width: 50px; height: 50px;
    border: 3px solid var(--border);
    border-top-color: var(--neon-purple);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .export-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    color: var(--neon-purple);
    letter-spacing: 0.1em;
  }

  /* SPECIAL WARNINGS */
  .warning-bar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 1rem;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px;
    margin-bottom: 0.6rem;
    font-size: 0.8rem;
    color: #fca5a5;
  }

  .warning-bar .warn-icon { font-size: 1rem; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }

  .empty-state h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    margin-bottom: 0.5rem;
    color: var(--text-secondary);
  }

  .empty-state p { font-size: 0.85rem; }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 3000;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .toast {
    background: var(--bg-card2);
    border: 1px solid var(--border-glow);
    border-radius: 8px;
    padding: 0.8rem 1.2rem;
    font-size: 0.85rem;
    color: var(--text-primary);
    min-width: 220px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    animation: toastIn 0.3s ease-out;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .toast.success { border-color: var(--neon-green); }
  .toast.error { border-color: #ef4444; }
  .toast.info { border-color: var(--accent); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-glow); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .toolbar { padding: 0.6rem 1rem; gap: 0.4rem; }
    main { padding: 1rem 1rem 4rem; }
    .session-info { grid-template-columns: 1fr; }
    .exam-card { grid-template-columns: auto 1fr; }
    .card-actions { flex-direction: row; grid-column: 1/-1; }
    .form-row { grid-template-columns: 1fr; }
    .stats-bar { gap: 0.6rem; }
  }

  #scheduleCapture { position: relative; }
</style>
</head>
